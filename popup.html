<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>History Insights</h1>
    <button id="gear" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
  </header>

  <!-- Main view -->
  <section id="main" hidden>
    <div class="row">
      <label for="range">Period</label>
      <select id="range">
        <option value="1">Last 24 hours</option>
        <option value="7" selected>Last 7 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
    </div>

    <label class="check">
      <input type="checkbox" id="includeTitles" />
      <span>Include page titles (richer insight, less private)</span>
    </label>

    <button id="analyse" class="primary">Analyse my history</button>

    <p id="status" class="status" hidden></p>
    <div id="result" class="result" hidden></div>
  </section>

  <!-- Settings view -->
  <section id="settings" hidden>
    <label for="apiKey">Anthropic API key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
    <p class="hint">Stored only in this browser (<code>chrome.storage.local</code>). Sent only to api.anthropic.com.</p>

    <label for="model">Model</label>
    <select id="model">
      <option value="claude-opus-4-7" selected>Claude Opus 4.7 (default)</option>
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (cheaper)</option>
      <option value="claude-haiku-4-5">Claude Haiku 4.5 (cheapest)</option>
    </select>

    <div class="row buttons">
      <button id="save" class="primary">Save</button>
      <button id="clearKey" class="ghost">Clear key</button>
    </div>
    <p id="settingsStatus" class="status" hidden></p>
  </section>
</body>
<script src="popup.js"></script>
</html>
